<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Header fisso con bottoni stile Java -->
 <style>
/* ========== HEADER FISSO CON BOTTONI STILE JAVA ========== */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: #111317;
    border-bottom: 2px solid #ff9800;
    padding: 0.8rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
    z-index: 1000;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

.navbar.scrolled {
    padding: 0.5rem 2rem;
    background: #0a0c10;
    border-bottom-color: #f44336;
}

/* Logo */
.nav-brand {
    font-size: 1.6rem;
    font-weight: 800;
    background: linear-gradient(135deg, #ff9800, #f44336);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.5px;
}

.nav-brand i {
    background: none;
    color: #ff9800;
    margin-right: 8px;
}

/* ========== BOTTONI STILE IMMAGINE ========== */
.nav-links {
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
}

.nav-links a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    color: #ffffff;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 700;
    background: #1a1e26;
    border: 2px solid #ff9800;
    border-radius: 50px;
    transition: all 0.25s ease;
    letter-spacing: 0.3px;
}

/* Effetto hover come da immagine */
.nav-links a:hover {
    background: linear-gradient(135deg, #ff9800, #f44336);
    border-color: #ff9800;
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(255, 152, 0, 0.35);
}

/* Link attivo (pagina corrente) */
.nav-links a.active {
    background: linear-gradient(135deg, #ff9800, #f44336);
    border-color: #ff9800;
    box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
}

/* Effetto click */
.nav-links a:active {
    transform: translateY(0);
    box-shadow: 0 2px 10px rgba(255, 152, 0, 0.3);
}

/* Icone nei bottoni */
.nav-links a i {
    font-size: 0.9rem;
    transition: transform 0.2s ease;
}

.nav-links a:hover i {
    transform: scale(1.1);
}

/* ========== RESPONSIVE ========== */
@media (max-width: 1100px) {
    .navbar {
        padding: 0.8rem 1rem;
    }
    
    .nav-links {
        gap: 0.6rem;
    }
    
    .nav-links a {
        padding: 6px 14px;
        font-size: 0.75rem;
    }
    
    .nav-links a i {
        font-size: 0.8rem;
    }
}

@media (max-width: 900px) {
    .nav-links a span {
        display: none;
    }
    
    .nav-links a {
        padding: 8px 14px;
    }
    
    .nav-links a i {
        font-size: 1rem;
        margin: 0;
    }
}

@media (max-width: 600px) {
    .navbar {
        flex-direction: column;
        padding: 0.6rem 1rem;
    }
    
    .nav-brand {
        font-size: 1.3rem;
    }
    
    .nav-links {
        width: 100%;
        justify-content: center;
    }
}
    </style>
</head>
<body>

<div class="navbar" id="navbar">
    <div class="nav-brand">
        <i class="fab fa-java"></i> JavaDoc Hub
    </div>
    <div class="nav-links">

        </a>

        <a href="collections.html">

            <span>Collections</span>
        </a>
        <a href="streams.html">

            <span>Stream</span>
        </a>
        <a href="exceptions.html">
            <i class="fas fa-exclamation-triangle"></i>
            <span>Eccezioni</span>
        </a>
        <a href="multithreading.html">

            <span>Thread</span>

        <a href="microservices.html">

    </div>
</div>
</body>
